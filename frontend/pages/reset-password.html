<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - GEHU Placement Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center;
           background:linear-gradient(135deg,#032241,#1a4a7a); }
    .card { background:#fff; border-radius:12px; padding:2.5rem; width:90%; max-width:420px;
            box-shadow:0 20px 60px rgba(0,0,0,0.2); }
    h2 { color:#032241; margin-bottom:0.5rem; }
    p { color:#6b7280; margin-bottom:1.5rem; font-size:0.9rem; }
    .form-group { margin-bottom:1rem; }
    label { display:block; margin-bottom:4px; font-weight:500; font-size:0.9rem; color:#374151; }
    input { width:100%; padding:12px; border:1px solid #d1d5db; border-radius:6px; font-size:0.95rem; }
    input:focus { outline:none; border-color:#4db8ff; box-shadow:0 0 0 3px rgba(77,184,255,0.2); }
    button { width:100%; padding:13px; background:#4db8ff; color:#fff; border:none;
             border-radius:6px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:0.5rem; }
    button:hover { background:#3498db; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    a { color:#4db8ff; text-decoration:none; font-size:0.9rem; }
    .back-link { display:block; text-align:center; margin-top:1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Reset Password</h2>
    <p>Enter your new password below.</p>
    <form id="resetForm" onsubmit="handleResetPassword(event)">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="Enter new password" minlength="6" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" minlength="6" required>
      </div>
      <button type="submit">Reset Password</button>
    </form>
    <a href="login-page.html" class="back-link">← Back to Login</a>
  </div>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
</body>
</html>
